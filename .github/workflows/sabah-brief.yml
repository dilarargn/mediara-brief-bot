name: Sabah Brief
on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  brief:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install requests pytz
      - run: python brief_bot.py
